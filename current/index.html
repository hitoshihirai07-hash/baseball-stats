  <meta charset="UTF-8" />

  <style>
:root{--bg:#0a0e1a;--bg2:#111827;--bg3:#1f2937;--ac:#f59e0b;--ac2:#3b82f6;--tx:#f9fafb;--tx2:#9ca3af;--bd:#374151;--ok:#10b981}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}
header{background:linear-gradient(135deg,#0f172a,#1e1b4b,#0f172a);border-bottom:2px solid var(--ac);padding:0 1.5rem;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(0,0,0,.5)}
.hi{max-width:1400px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:64px;gap:1rem}
.logo{font-size:1.2rem;font-weight:900;text-decoration:none;color:var(--tx)}
.logo span{color:var(--ac)}
nav{display:flex;gap:.2rem;flex-wrap:wrap;justify-content:flex-end}
nav a{color:var(--tx2);padding:.5rem .9rem;border-radius:6px;text-decoration:none;font-size:.85rem;font-weight:700}
nav a:hover,nav a.active{background:rgba(245,158,11,.15);color:var(--ac)}
.hero{background:linear-gradient(135deg,#0f172a,#1e1b4b);padding:2rem 1.5rem}
.hero-in{max-width:1400px;margin:0 auto}
.hero h1{font-size:clamp(1.5rem,4vw,2.4rem);font-weight:900;margin-bottom:.5rem}
.hero h1 em{font-style:normal;background:linear-gradient(90deg,#f59e0b,#f97316);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.main{max-width:1400px;margin:0 auto;padding:1.5rem}
.grid{display:grid;gap:1rem}
.card{background:var(--bg2);border:1px solid var(--bd);border-radius:14px;padding:1.1rem 1.1rem 1.25rem;box-shadow:0 18px 40px rgba(0,0,0,.22)}
.card h2,.card h3{font-size:1.08rem;font-weight:800;display:flex;align-items:center;gap:.55rem;margin-bottom:1rem}
.card h2::before,.card h3::before{content:'';width:4px;height:1.1em;background:var(--ac);border-radius:2px}
.filters{display:flex;gap:.7rem;flex-wrap:wrap;margin-bottom:1rem}
.fg{display:flex;align-items:center;gap:.45rem}
.fg label{font-size:.78rem;color:var(--tx2);white-space:nowrap}
select,input[type=text]{background:var(--bg3);border:1px solid var(--bd);color:var(--tx);padding:.5rem .75rem;border-radius:8px;font-family:inherit;font-size:.9rem;outline:none}
select:hover,input[type=text]:hover{border-color:var(--ac2)}
select:focus,input[type=text]:focus{border-color:var(--ac)}
.summary-row{display:flex;gap:.75rem;flex-wrap:wrap;margin-bottom:1rem}
.summary-chip{display:inline-flex;align-items:center;gap:.45rem;background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.25);padding:.42rem .72rem;border-radius:999px;color:#fbbf24;font-weight:700;font-size:.82rem}
.btn-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:.9rem}
.link-card,.action-btn{background:linear-gradient(180deg,rgba(245,158,11,.08),rgba(17,24,39,.75));border:1px solid rgba(245,158,11,.2);border-radius:14px;padding:1rem;text-decoration:none;color:var(--tx);display:block}
.link-card h3{font-size:1rem;font-weight:800;margin-bottom:.2rem}
.link-card h3::before{display:none}
.link-card:hover,.action-btn:hover{border-color:rgba(245,158,11,.5);transform:translateY(-1px)}
.tw{background:var(--bg2);border:1px solid var(--bd);border-radius:12px;overflow:auto}
table{width:100%;border-collapse:collapse;min-width:900px}
thead tr{background:var(--bg3);border-bottom:2px solid var(--ac)}
th,td{padding:.72rem .9rem;white-space:nowrap}
th{text-align:left;font-size:.72rem;color:var(--tx2);font-weight:800;letter-spacing:.04em}
tbody tr{border-bottom:1px solid var(--bd)}
tbody tr:hover{background:rgba(59,130,246,.06)}
tbody tr:last-child{border-bottom:none}
td{font-size:.9rem}
.empty{text-align:center;color:var(--tx2);padding:2rem 1rem}
.page-tabs{display:flex;gap:.55rem;flex-wrap:wrap;margin-top:1rem}
.page-tab{display:inline-flex;align-items:center;justify-content:center;padding:.6rem .95rem;border-radius:999px;text-decoration:none;background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.25);color:var(--tx);font-weight:700;font-size:.84rem}
.page-tab.active{background:rgba(245,158,11,.14);border-color:rgba(245,158,11,.4);color:#fbbf24}
.team-badge{display:inline-flex;align-items:center;justify-content:center;min-width:1.7rem;height:1.7rem;padding:0 .45rem;border-radius:999px;background:rgba(59,130,246,.16);border:1px solid rgba(59,130,246,.35);font-size:.72rem;font-weight:800;margin-right:.5rem;color:#bfdbfe}
.section-block + .section-block{margin-top:1rem}
.small{font-size:.78rem;color:var(--tx2)}
@media (max-width: 1080px){.btn-grid{grid-template-columns:1fr}}
@media (max-width: 900px){header{padding:0 .8rem}.hi{height:auto;align-items:flex-start;padding:.7rem 0;flex-direction:column}nav{width:100%;overflow:auto;flex-wrap:nowrap}.hero,.main{padding:1rem .9rem}.fg{width:100%}.fg label{min-width:4rem}select,input[type=text]{flex:1;min-width:0}.page-tab{width:100%}table{min-width:760px}}

.site-footer{border-top:1px solid var(--bd);margin-top:2rem;background:rgba(17,24,39,.85)}
.site-footer-inner{max-width:1400px;margin:0 auto;padding:1rem 1.5rem;display:flex;gap:.8rem;align-items:center;justify-content:space-between;flex-wrap:wrap;color:var(--tx2);font-size:.82rem}
.site-footer-nav{display:flex;gap:.9rem;flex-wrap:wrap}
.site-footer-nav a{color:var(--tx2);text-decoration:none;font-weight:700}
.site-footer-nav a:hover{color:var(--ac)}

</style>

<body>

    <section class="card">

  <script>
window.CurrentPagesCommon = (function () {
  const TEAM_ORDER = [
    '読売ジャイアンツ','阪神タイガース','横浜DeNAベイスターズ','広島東洋カープ','中日ドラゴンズ','東京ヤクルトスワローズ',
    '福岡ソフトバンクホークス','北海道日本ハムファイターズ','オリックスバファローズ','埼玉西武ライオンズ','東北楽天ゴールデンイーグルス','千葉ロッテマリーンズ'
  ];
  const TEAM_ABBR = {
    '読売ジャイアンツ':'巨','阪神タイガース':'神','横浜DeNAベイスターズ':'De','広島東洋カープ':'広','中日ドラゴンズ':'中','東京ヤクルトスワローズ':'ヤ',
    '福岡ソフトバンクホークス':'ソ','北海道日本ハムファイターズ':'日','オリックス・バファローズ':'オ','オリックスバファローズ':'オ','埼玉西武ライオンズ':'西','東北楽天ゴールデンイーグルス':'楽','千葉ロッテマリーンズ':'ロ'
  };
  function normalizeTeam(team) {
    const raw = String(team || '').trim();
    const map = {
      '巨人':'読売ジャイアンツ','阪神':'阪神タイガース','DeNA':'横浜DeNAベイスターズ','横浜DeNA':'横浜DeNAベイスターズ','広島':'広島東洋カープ',
      '中日':'中日ドラゴンズ','ヤクルト':'東京ヤクルトスワローズ','ソフトバンク':'福岡ソフトバンクホークス','西武':'埼玉西武ライオンズ',
      '楽天':'東北楽天ゴールデンイーグルス','ロッテ':'千葉ロッテマリーンズ','日本ハム':'北海道日本ハムファイターズ','日ハム':'北海道日本ハムファイターズ',
      'オリックス':'オリックスバファローズ','オリックス・バファローズ':'オリックスバファローズ'
    };
    return map[raw] || raw;
  }
  function normalizeLoose(team) { return String(normalizeTeam(team) || '').replace(/[・･\s]/g, ''); }
  function teamOrder(team) {
    const normalized = normalizeLoose(team);
    const idx = TEAM_ORDER.map(normalizeLoose).indexOf(normalized);
    return idx === -1 ? 999 : idx;
  }
  function teamBadge(team) {
    const label = TEAM_ABBR[team] || TEAM_ABBR[normalizeTeam(team)] || '球';
    return `<span class="team-badge">${label}</span>`;
  }
  function parseCSVLine(line) {
    const out = []; let cur = ''; let inQuotes = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') {
        if (inQuotes && line[i + 1] === '"') { cur += '"'; i++; } else { inQuotes = !inQuotes; }
      } else if (ch === ',' && !inQuotes) {
        out.push(cur); cur = '';
      } else {
        cur += ch;
      }
    }
    out.push(cur);
    return out.map(v => v.trim());
  }
  async function loadCSV(path) {
    const res = await fetch(path);
    if (!res.ok) throw new Error('読込に失敗しました');
    const text = await res.text();
    const lines = text.replace(/^\uFEFF/, '').split(/\r?\n/).filter(Boolean);
    if (!lines.length) return [];
    const header = parseCSVLine(lines[0]);
    return lines.slice(1).map(line => {
      const cols = parseCSVLine(line);
      const row = {};
      header.forEach((key, idx) => row[key] = cols[idx] ?? '');
      return row;
    });
  }
  function fillTeamSelect(select, teams, includeAllLabel, preferredTeam) {
    const sorted = [...teams].sort((a, b) => teamOrder(a) - teamOrder(b) || String(a).localeCompare(String(b), 'ja'));
    select.innerHTML = (includeAllLabel ? `<option value="">${includeAllLabel}</option>` : '') + sorted.map(team => `<option value="${team}">${team}</option>`).join('');
    const normalizedPreferred = normalizeLoose(preferredTeam || '');
    if (normalizedPreferred) {
      const target = [...select.options].find(opt => normalizeLoose(opt.value) === normalizedPreferred);
      if (target) select.value = target.value;
    }
  }
  function getTeamFromQuery() {
    const params = new URLSearchParams(location.search);
    return params.get('team') || '';
  }
  function updateTeamQuery(team) {
    const params = new URLSearchParams(location.search);
    if (team) params.set('team', team); else params.delete('team');
    const query = params.toString();
    history.replaceState(null, '', location.pathname + (query ? `?${query}` : ''));
  }
  function buildPageHref(path, team) { return path + (team ? `?team=${encodeURIComponent(team)}` : ''); }
  function syncPageLinks(team) {
    document.querySelectorAll('[data-team-link]').forEach(el => {
      const path = el.getAttribute('data-team-link') || '';
      if (path) el.setAttribute('href', buildPageHref(path, team));
    });
  }
  return {TEAM_ORDER, normalizeTeam, normalizeLoose, teamOrder, teamBadge, parseCSVLine, loadCSV, fillTeamSelect, getTeamFromQuery, updateTeamQuery, buildPageHref, syncPageLinks};
})();
</script>
  <script>
(function () {
  const C = window.CurrentPagesCommon;
  const teamSelect = document.getElementById('current-team-jump');
  let sections = [];

  function isStandingsContinuationRow_(cols, hasPrevious) {
    if (!hasPrevious) return false;
    const trimmed = cols.map(v => String(v || '').trim());
    const first = trimmed[0] || '';
    if (!first) return false;
    if (/^\(\d+\)/.test(first)) return true;
    const nonEmpty = trimmed.filter(Boolean);
    return nonEmpty.length <= 2 && first.includes(',');
  }

  function normalizeContinuationValues_(cols) {
    let values = cols.map(v => String(v || '').trim()).filter(Boolean);
    if (values.length === 1 && values[0].includes(',')) {
      values = C.parseCSVLine(values[0]).map(v => String(v || '').trim()).filter(Boolean);
    }
    if (values.length >= 2 && /^\(\d+\)$/.test(values[0])) {
      values = [values[0] + ',' + values[1]].concat(values.slice(2));
    }
    return values;
  }

  function buildStandingsRows_(group) {
    const header = group[0].map(v => String(v || '').trim());
    const rows = [];
    let previous = null;

    group.slice(1).forEach(cols => {
      const trimmed = cols.map(v => String(v || '').trim());
      if (!trimmed.some(Boolean)) return;

      if (isStandingsContinuationRow_(trimmed, !!previous)) {
        const values = normalizeContinuationValues_(trimmed);
        if (values.length && previous) {
          const firstMatchupIndex = Math.max(0, header.findIndex(col => /^対|^交流戦$/.test(col)));
          let insertIndex = Math.max(Math.min(previous.rawLength, header.length), firstMatchupIndex);
          values.forEach(value => {
            if (insertIndex < header.length) previous.values[insertIndex++] = value;
          });
          previous.rawLength = insertIndex;
        }
        return;
      }

      const row = {
        values: header.map((_, idx) => trimmed[idx] || ''),
        rawLength: Math.min(trimmed.length, header.length)
      };
      rows.push(row);
      previous = row;
    });

    return rows.map(row => {
      const obj = {};
      header.forEach((key, idx) => obj[key] = row.values[idx] || '');
      return obj;
    });
  }

  async function loadStandingsSections() {
    const res = await fetch('/npb_2026standings.csv');
    if (!res.ok) throw new Error('順位表の読込に失敗しました');
    const text = await res.text();
    const lines = text.replace(/^\uFEFF/, '').split(/\r?\n/);
    const rawRows = lines.map(line => C.parseCSVLine(line));
    const groups = [];
    let current = [];
    rawRows.forEach(row => {
      const isBlank = row.every(v => !String(v || '').trim());
      if (isBlank) {
        if (current.length) { groups.push(current); current = []; }
      } else {
        current.push(row);
      }
    });
    if (current.length) groups.push(current);
    return groups.map(group => {
      const header = group[0].map(v => String(v || '').trim());
      const rows = buildStandingsRows_(group);
      const league = header.includes('対巨') ? 'セ・リーグ' : header.includes('対ソ') ? 'パ・リーグ' : '';
      return { league, header, rows };
    }).filter(section => section.header.length && section.rows.length);
  }

  function renderStandings() {
    const team = teamSelect.value || '';
    const target = document.getElementById('standings-sections');
    target.innerHTML = sections.map(section => {
      const title = section.league ? `<h3>${section.league}</h3>` : '';
      const head = `<thead><tr>${section.header.map(col => `<th>${col}</th>`).join('')}</tr></thead>`;
      const body = section.rows.map(row => {
        const normalized = C.normalizeTeam(row['チーム'] || '');
        const active = team && C.normalizeLoose(normalized) === C.normalizeLoose(team);
        return `<tr${active ? ' style="background:rgba(245,158,11,.08)"' : ''}>` + section.header.map(col => {
          const value = row[col] || '-';
          if (col === 'チーム') return `<td>${C.teamBadge(normalized)}${value}</td>`;
          return `<td>${value}</td>`;
        }).join('') + '</tr>';
      }).join('');
      return `<div class="section-block"><div class="tw">${title}<table>${head}<tbody>${body}</tbody></table></div></div>`;
    }).join('');
    const count = sections.reduce((sum, section) => sum + section.rows.length, 0);
    document.getElementById('standings-summary').textContent = team ? `${team} を強調表示中` : `${count}球団を表示中`;
    C.updateTeamQuery(team);
    C.syncPageLinks(team);
  }

  (async function init() {
    try {
      sections = await loadStandingsSections();
      const teams = sections.flatMap(section => section.rows.map(row => C.normalizeTeam(row['チーム'] || ''))).filter(Boolean);
      C.fillTeamSelect(teamSelect, [...new Set(teams)], '全球団', C.getTeamFromQuery());
      renderStandings();
      teamSelect.addEventListener('change', renderStandings);
    } catch (error) {
      document.getElementById('standings-sections').innerHTML = `<div class="tw"><table><tbody><tr><td class="empty">${error.message}</td></tr></tbody></table></div>`;
      document.getElementById('standings-summary').textContent = '読込失敗';
    }
  })();
})();
</script>
