<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <meta name="theme-color" content="#0f172a" />
  <title>NPB Stats | 今年度 打順</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;600;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="current-pages.css" />
</head>
<body>
  <header>
    <div class="hi">
      <a class="logo" href="index.html">NPB <span>Stats</span></a>
      <nav>
        <a href="index.html">ホーム</a>
        <a href="current.html" class="active">今年度</a>
        <a href="batting.html">打撃成績</a>
        <a href="pitching.html">投手成績</a>
        <a href="simulator.html">シミュレーター</a>
        <a href="order.html">オーダー</a>
        <a href="myorder.html">俺のオーダー</a>
        <a href="pro-report.html">分析レポート</a>
        <a href="team.html">チーム成績</a>
        <a href="records.html">成績記録</a>
      </nav>
    </div>
  </header>

  <section class="hero">
    <div class="hero-in">
      <h1>今年度 <em>打順</em></h1>
      <p>今年の試合日ごとの打順一覧です。自チーム名と対戦相手を残した形で表示します。</p>
      <div class="page-tabs">
        <a class="page-tab" data-team-link="current.html" href="current.html">今年度トップ</a>
        <a class="page-tab" data-team-link="current-master.html" href="current-master.html">選手マスタ</a>
        <a class="page-tab" data-team-link="current-stats.html" href="current-stats.html">成績</a>
        <a class="page-tab active" href="current-order.html">打順</a>
      </div>
    </div>
  </section>

  <main class="main grid">
    <section class="card">
      <h2>今年度打順一覧</h2>
      <p class="note">球団を選ぶと、その球団の試合日ごとの打順を確認できます。表示順は新しい順が初期値です。</p>
      <div class="filters">
        <div class="fg"><label>球団</label><select id="co-team"></select></div>
        <div class="fg"><label>並び順</label><select id="co-sort"><option value="desc">新しい順</option><option value="asc">古い順</option></select></div>
        <div class="fg"><label>表示数</label><select id="co-limit"><option value="10">10試合</option><option value="30">30試合</option><option value="50">50試合</option><option value="9999">全試合</option></select></div>
      </div>
      <div class="mini-links">
        <a class="btn sub" data-team-link="current-master.html" href="current-master.html">この球団の選手マスタへ</a>
        <a class="btn sub" data-team-link="current-stats.html" href="current-stats.html">この球団の成績へ</a>
      </div>
      <div class="summary-row">
        <div class="summary-chip" id="co-summary">読込中</div>
        <div class="summary-chip" id="co-last-updated">-</div>
      </div>
      <div class="tw">
        <table>
          <thead><tr><th>試合日</th><th>チーム</th><th>1</th><th>2</th><th>3</th><th>4</th><th>5</th><th>6</th><th>7</th><th>8</th><th>9</th><th>投手</th><th>対戦相手</th></tr></thead>
          <tbody id="co-body"><tr><td colspan="13" class="empty">読込中...</td></tr></tbody>
        </table>
      </div>
      <div class="small" id="co-foot" style="margin-top:.75rem"></div>
    </section>
  </main>

  <script src="current-pages-common.js"></script>
  <script>
    const C = window.CurrentPagesCommon;
    const state = { rows: [] };

    async function loadCurrentOrders() {
      const rows = await C.loadCSV('2026lineup.csv');
      const header = rows.length ? Object.keys(rows[0]) : [];
      const hasOpponentColumn = header.some(col => /対戦相手/.test(col)) || header.length >= 14;
      return rows.map(row => {
        const cols = header.map(key => row[key] || '');
        const order = cols.slice(3, 12);
        return {
          gameId: cols[0] || '',
          gameDate: cols[1] || '',
          team: cols[2] || '',
          teamNormalized: C.normalizeLoose(cols[2] || ''),
          one: order[0] || '', two: order[1] || '', three: order[2] || '', four: order[3] || '', five: order[4] || '', six: order[5] || '', seven: order[6] || '', eight: order[7] || '', nine: order[8] || '',
          pitcher: cols[12] || order[8] || '',
          opponent: hasOpponentColumn ? (cols[13] || '') : ''
        };
      }).filter(row => row.gameDate && row.team);
    }

    function fillTeams() {
      const teams = [...new Map(state.rows.map(row => [row.teamNormalized, row.team])).values()];
      C.fillTeamSelect(document.getElementById('co-team'), teams, '全球団', C.getTeamFromQuery());
    }

    function renderCurrentOrders() {
      const team = document.getElementById('co-team').value || '';
      const sort = document.getElementById('co-sort').value;
      const limit = Number(document.getElementById('co-limit').value || 10);
      const filtered = state.rows.filter(row => !team || row.teamNormalized === C.normalizeLoose(team)).sort((a,b) => {
        const d = String(a.gameDate).localeCompare(String(b.gameDate));
        if (d !== 0) return sort === 'asc' ? d : -d;
        const g = String(a.gameId).localeCompare(String(b.gameId));
        return sort === 'asc' ? g : -g;
      });
      const visible = limit === 9999 ? filtered : filtered.slice(0, limit);
      document.getElementById('co-body').innerHTML = visible.length ? visible.map(row => `
        <tr>
          <td>${row.gameDate}</td><td>${C.teamBadge(row.team)}${row.team}</td><td>${row.one || '-'}</td><td>${row.two || '-'}</td><td>${row.three || '-'}</td><td>${row.four || '-'}</td><td>${row.five || '-'}</td><td>${row.six || '-'}</td><td>${row.seven || '-'}</td><td>${row.eight || '-'}</td><td>${row.nine || '-'}</td><td>${row.pitcher || '-'}</td><td>${row.opponent || '-'}</td>
        </tr>`).join('') : '<tr><td colspan="13" class="empty">該当する打順がありません。</td></tr>';
      const label = team || '全球団';
      document.getElementById('co-summary').textContent = `${label} ${filtered.length}試合`;
      document.getElementById('co-foot').textContent = visible.length ? `${label} ${visible.length}試合を表示中` : `${label} の表示データはありません。`;
      C.updateTeamQuery(team);
      C.syncPageLinks(team);
    }

    (async function init() {
      try {
        state.rows = await loadCurrentOrders();
        fillTeams();
        const lastDate = state.rows.map(row => row.gameDate).sort().slice(-1)[0] || '-';
        document.getElementById('co-last-updated').textContent = `最新試合日: ${lastDate}`;
        ['co-team','co-sort','co-limit'].forEach(id => document.getElementById(id).addEventListener('change', renderCurrentOrders));
        renderCurrentOrders();
      } catch (error) {
        document.getElementById('co-body').innerHTML = `<tr><td colspan="13" class="empty">${error.message}</td></tr>`;
        document.getElementById('co-summary').textContent = '読込失敗';
      }
    })();
  </script>
</body>
</html>
